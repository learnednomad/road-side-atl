name: Deploy

on:
  push:
    tags: ['v*.*.*']

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy to Production
    # Coolify's API is only reachable from the host it runs on (localhost:8000),
    # so this job runs on the self-hosted runner installed on that host.
    runs-on: [self-hosted, coolify-host]
    if: "!contains(github.ref, '-')"
    environment: production
    steps:
      - name: Trigger Coolify deployment
        id: trigger
        run: |
          # Use the /deploy endpoint (rebuilds from the tracked branch) — NOT
          # /restart, which only bounces the existing (stale) container image and
          # never picks up the newly-tagged code.
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            "${{ secrets.COOLIFY_API_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Response: $BODY"
          echo "HTTP Code: $HTTP_CODE"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Coolify deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi

          # The trigger response carries the deployment's uuid — the wait step
          # polls it so a failed image build can't pass as a green deploy.
          DEPLOYMENT_UUID=$(echo "$BODY" | grep -o '"deployment_uuid":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -z "$DEPLOYMENT_UUID" ]; then
            echo "::error::Could not extract deployment_uuid from Coolify response"
            exit 1
          fi
          echo "deployment_uuid=$DEPLOYMENT_UUID" >> "$GITHUB_OUTPUT"
          echo "Deployment $DEPLOYMENT_UUID triggered for ${{ github.ref_name }}"

      - name: Wait for Coolify build to finish
        run: |
          # Coolify builds asynchronously; the old container keeps serving (and
          # passing HTTP health checks) until the new image is up. Poll the
          # actual deployment status instead. Builds run ~5-10 min; allow 25.
          DEPLOYMENT_UUID="${{ steps.trigger.outputs.deployment_uuid }}"
          for i in $(seq 1 50); do
            STATUS=$(curl -s \
              "${{ secrets.COOLIFY_API_URL }}/api/v1/deployments/$DEPLOYMENT_UUID" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
              | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)

            echo "Deployment status: ${STATUS:-unknown} (attempt $i/50)"
            case "$STATUS" in
              finished)
                echo "Coolify deployment finished."
                exit 0
                ;;
              failed|cancelled)
                echo "::error::Coolify deployment ended with status '$STATUS'. Check Coolify logs."
                exit 1
                ;;
            esac
            sleep 30
          done

          echo "::error::Coolify deployment did not finish within 25 minutes."
          exit 1

      - name: Verify deployment health
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://roadsidega.com/api/health" \
              --connect-timeout 10 --max-time 15)

            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check returned $STATUS (attempt $i/10), retrying in 30s..."
            sleep 30
          done

          echo "::error::Health check did not return 200 after deployment. Check Coolify logs."
          exit 1

  deploy-staging:
    name: Deploy to Staging (Pre-release)
    # Same constraint as production: Coolify's API is only reachable from its
    # own host, so this runs on the self-hosted runner there.
    runs-on: [self-hosted, coolify-host]
    if: "contains(github.ref, '-')"
    environment: staging
    steps:
      - name: Trigger Coolify staging deployment
        id: trigger
        run: |
          # /deploy rebuilds the staging app from its tracked branch
          # (development). Note: Coolify builds the branch HEAD, not the tag
          # commit — cut rc tags from the development HEAD you intend to ship.
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            "${{ secrets.COOLIFY_API_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_STAGING_APP_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Response: $BODY"
          echo "HTTP Code: $HTTP_CODE"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Coolify staging deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi

          DEPLOYMENT_UUID=$(echo "$BODY" | grep -o '"deployment_uuid":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -z "$DEPLOYMENT_UUID" ]; then
            echo "::error::Could not extract deployment_uuid from Coolify response"
            exit 1
          fi
          echo "deployment_uuid=$DEPLOYMENT_UUID" >> "$GITHUB_OUTPUT"
          echo "Staging deployment $DEPLOYMENT_UUID triggered for ${{ github.ref_name }}"

      - name: Wait for Coolify build to finish
        run: |
          DEPLOYMENT_UUID="${{ steps.trigger.outputs.deployment_uuid }}"
          for i in $(seq 1 50); do
            STATUS=$(curl -s \
              "${{ secrets.COOLIFY_API_URL }}/api/v1/deployments/$DEPLOYMENT_UUID" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
              | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)

            echo "Deployment status: ${STATUS:-unknown} (attempt $i/50)"
            case "$STATUS" in
              finished)
                echo "Coolify staging deployment finished."
                exit 0
                ;;
              failed|cancelled)
                echo "::error::Coolify staging deployment ended with status '$STATUS'. Check Coolify logs."
                exit 1
                ;;
            esac
            sleep 30
          done

          echo "::error::Coolify staging deployment did not finish within 25 minutes."
          exit 1

      - name: Verify staging deployment health
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://staging-roadsidega.learnednomad.com/api/health" \
              --connect-timeout 10 --max-time 15)

            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check returned $STATUS (attempt $i/10), retrying in 30s..."
            sleep 30
          done

          echo "::error::Staging health check did not return 200 after deployment. Check Coolify logs."
          exit 1
