services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
        - NEXT_PUBLIC_CASHAPP_TAG=${NEXT_PUBLIC_CASHAPP_TAG:-}
        - NEXT_PUBLIC_ZELLE_INFO=${NEXT_PUBLIC_ZELLE_INFO:-}
        - NEXT_PUBLIC_BUSINESS_PHONE=${NEXT_PUBLIC_BUSINESS_PHONE:-}
        - NEXT_PUBLIC_BUSINESS_NAME=${NEXT_PUBLIC_BUSINESS_NAME:-RoadSide GA}
        - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    # Bind to localhost only — don't expose the app on all host interfaces (L8).
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - NODE_ENV=production
      # Business operates in Atlanta — local hour/day math runs in ET, not UTC (M10).
      - TZ=${TZ:-America/New_York}
      # Enable when running behind a reverse proxy (Coolify/Traefik, nginx, Cloudflare)
      # so per-client rate limiting keys on the real client IP. Without it the app
      # only sees the proxy IP and rate limiting fails open.
      - TRUST_PROXY=${TRUST_PROXY:-false}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-dealer}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-roadside_atl}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID:-}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      - NEXT_PUBLIC_CASHAPP_TAG=${NEXT_PUBLIC_CASHAPP_TAG:-}
      - NEXT_PUBLIC_ZELLE_INFO=${NEXT_PUBLIC_ZELLE_INFO:-}
      - NEXT_PUBLIC_BUSINESS_PHONE=${NEXT_PUBLIC_BUSINESS_PHONE:-}
      - NEXT_PUBLIC_BUSINESS_NAME=${NEXT_PUBLIC_BUSINESS_NAME:-RoadSide GA}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@roadsidega.com}
      - GOOGLE_MAPS_API_KEY_SERVER=${GOOGLE_MAPS_API_KEY_SERVER:-}
      - AUTO_DISPATCH_ENABLED=${AUTO_DISPATCH_ENABLED:-true}
      - MAX_DISPATCH_DISTANCE_MILES=${MAX_DISPATCH_DISTANCE_MILES:-50}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM=${RESEND_FROM:-noreply@roadsidega.com}
      - SEED_DB=${SEED_DB:-false}
      - APP_ENV=${APP_ENV:-production}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - roadside-network

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dealer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-roadside_atl}
    # Internal-only — reachable by the app over the compose network as db:5432.
    # NOT published to the host, so the DB isn't exposed by `docker compose up` (L8).
    # (Supersedes the earlier "map to host 5433" change — when the DB isn't
    # published there is no host port to conflict with.)
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dealer} -d ${POSTGRES_DB:-roadside_atl}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - roadside-network

networks:
  roadside-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
